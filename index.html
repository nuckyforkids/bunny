<meta charset="utf-8">
<title>동물 친구 놀자</title>
<meta name="description" content="동물을 골라 크게 키우고 — 먹이 주고, 만지면 반응하고, 똥 싸고 닦고, 재우면 이불 덮어줘요.">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<style>
  html,body{height:100%;margin:0;overflow:hidden;overscroll-behavior:none;position:fixed;inset:0;width:100%;
    -webkit-text-size-adjust:100%;touch-action:manipulation;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  #stage{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:linear-gradient(180deg,#eef4fb,#e4edf6);overflow:hidden;padding-bottom:50px;}
  .hint{margin:8px 16px 0;text-align:center;font-size:clamp(14px,3.8vw,19px);font-weight:800;color:#3f5a3a;text-shadow:0 1px 0 #fff;min-height:22px;padding:0 8px;}

  .picker{display:flex;gap:8px;overflow-x:auto;padding:8px 10px 2px;max-width:100%;scrollbar-width:none;}
  .picker::-webkit-scrollbar{display:none;}
  .pk{flex:0 0 auto;width:52px;height:52px;border-radius:16px;border:none;background:#fffdf7;font-size:28px;
    box-shadow:0 3px 0 rgba(63,90,58,.25);cursor:pointer;}
  .pk[aria-pressed="true"]{background:#ffe9a6;box-shadow:0 3px 0 #d9b94e;outline:3px solid #3f5a3a;}
  .pk:active{transform:translateY(2px);}

  .foodtop{display:flex;flex-direction:column;align-items:center;gap:2px;margin-top:2px;}
  .ftnum{display:flex;align-items:center;gap:6px;line-height:1;}
  .ftwho{font-size:clamp(22px,6vw,32px);}
  .ftn{font-size:clamp(28px,8vw,46px);font-weight:900;color:#3f5a3a;text-shadow:0 1px 0 #fff;font-variant-numeric:tabular-nums;}
  .ftgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:1px 6px;}
  .ftgrid span{font-size:clamp(16px,4.5vw,26px);animation:fpop .3s ease;}
  @keyframes fpop{0%{transform:scale(.2);}60%{transform:scale(1.2);}100%{transform:scale(1);}}

  .scene{flex:1;position:relative;display:flex;align-items:flex-end;justify-content:center;width:100%;padding:4px 3vw 0;overflow:hidden;
    transition:background .4s ease;background:linear-gradient(180deg,#cdeafd 0%,#a9d8f5 55%,#bfe6a0 55%,#9fd47f 100%);}
  .char{position:relative;display:flex;align-items:flex-end;justify-content:center;padding:4px;}
  .char svg{width:min(64vw,330px);height:auto;}

  .blanket{position:absolute;left:50%;bottom:0;transform:translate(-50%,115%);width:96%;max-width:520px;height:40%;
    border-radius:46px 46px 0 0;z-index:4;transition:transform .5s cubic-bezier(.34,1.3,.64,1);
    background:repeating-linear-gradient(48deg,#8fc0ef 0 26px,#b6d8f6 26px 52px);box-shadow:0 -5px 14px rgba(0,0,0,.15);border-top:10px solid #fff;}
  .blanket.on{transform:translate(-50%,0);}
  .zzz{position:absolute;top:14%;left:50%;transform:translateX(-50%);font-size:clamp(30px,9vw,52px);z-index:5;opacity:0;transition:opacity .4s;pointer-events:none;}
  .zzz.on{opacity:1;animation:zfloat 2.4s ease-in-out infinite;}
  @keyframes zfloat{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-12px);}}

  .gauges{position:absolute;top:-38px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:3px;z-index:8;}
  .gauge{position:relative;width:92px;height:16px;background:#fff;border-radius:9px;
    box-shadow:0 2px 4px rgba(0,0,0,.2);overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .gfill{position:absolute;left:0;top:0;height:100%;width:0;background:#ffd98a;transition:width .3s;}
  .gfill.gwf{background:#a9dcff;}
  .gpoop.full .gfill{background:#cf9a4e;width:100%;}
  .gwater.full .gfill{background:#4ea3e0;width:100%;}
  .gtxt{position:relative;font-size:10px;font-weight:800;color:#5a4632;font-variant-numeric:tabular-nums;}
  .gauge.full{animation:gpulse 1s ease-in-out infinite;}
  @keyframes gpulse{0%,100%{box-shadow:0 2px 4px rgba(0,0,0,.2);}50%{box-shadow:0 0 11px 3px rgba(207,154,78,.85);}}

  .fur{fill:var(--fur,#fff);stroke:var(--furline,#e9dccb);}
  .hit{cursor:pointer;}
  .ear{transform-box:fill-box;transform-origin:50% 92%;}
  .ear.top{transform-origin:50% 12%;}
  .ear.a-perk{animation:ear-perk .6s ease;}
  .ear.a-flop{animation:ear-flop .7s cubic-bezier(.34,1.56,.64,1);}
  .ear.a-flap{animation:ear-flap .6s ease;}
  .ear.a-twitch{animation:ear-twitch .5s ease;}
  @keyframes ear-perk{0%,100%{transform:scaleY(1) translateY(0);}40%{transform:scaleY(1.18) translateY(-8px);}}
  @keyframes ear-flop{0%,100%{transform:rotate(0) scaleY(1);}45%{transform:rotate(calc(55deg*var(--d))) scaleY(.6);}}
  @keyframes ear-flap{0%,100%{transform:rotate(0);}20%{transform:rotate(calc(22deg*var(--d)));}50%{transform:rotate(calc(-18deg*var(--d)));}80%{transform:rotate(calc(12deg*var(--d)));}}
  @keyframes ear-twitch{0%,100%{transform:rotate(0);}15%{transform:rotate(8deg);}35%{transform:rotate(-8deg);}55%{transform:rotate(6deg);}75%{transform:rotate(-6deg);}}

  .eye{transform-box:fill-box;transform-origin:center;transition:transform .09s ease;}
  .eye.blink{transform:scaleY(.08);}
  .nose{transform-box:fill-box;transform-origin:center;}
  .nose.sniff{animation:sniff .5s ease;}
  @keyframes sniff{0%,100%{transform:scale(1);}30%{transform:scale(1.35) translateY(2px);}60%{transform:scale(.9);}}
  .cheek{opacity:0;transition:opacity .4s ease;}
  .cheek.show{opacity:.85;}

  .creature{transform-box:fill-box;transform-origin:50% 100%;filter:drop-shadow(0 6px 4px rgba(0,0,0,.16));}
  .creature.breathe{animation:breathe 3.4s ease-in-out infinite;}
  @keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.012);}}
  .creature.bounce{animation:bounce .55s ease;}
  @keyframes bounce{0%,100%{transform:translateY(0);}40%{transform:translateY(-26px) scale(1.05);}}
  .creature.jump{animation:cjump .85s ease;}
  @keyframes cjump{0%{transform:translateY(0) scaleY(1);}12%{transform:translateY(0) scaleY(.8) scaleX(1.1);}
    45%{transform:translateY(-120px) scaleY(1.1) scaleX(.92) rotate(-3deg);}72%{transform:translateY(0) scaleY(.86) scaleX(1.08);}100%{transform:translateY(0) scaleY(1);}}
  .mouth-g.munch{animation:munch .45s ease 3;}
  @keyframes munch{0%,100%{transform:translateY(0);}50%{transform:translateY(3px);}}
  .creature.refuse{animation:refuse .55s ease;}
  @keyframes refuse{0%,100%{transform:translateX(0) rotate(0);}18%{transform:translateX(-14px) rotate(-4deg);}38%{transform:translateX(14px) rotate(4deg);}58%{transform:translateX(-11px) rotate(-3deg);}78%{transform:translateX(11px) rotate(3deg);}}

  .face{transition:opacity .15s;}
  .turned{animation:none!important;transition:transform .35s ease;transform:rotateY(180deg);}
  .turned .face{opacity:0;}
  .tail-back{opacity:0;transition:opacity .2s;}
  .turned .tail-back{opacity:1;}

  .bubble{position:absolute;font-size:clamp(24px,6.5vw,42px);font-weight:900;color:#ff7aa2;pointer-events:none;opacity:0;text-shadow:0 2px 0 #fff;z-index:9;}
  .bubble.go{animation:pop 1s ease forwards;}
  @keyframes pop{0%{opacity:0;transform:translateY(0) scale(.5);}25%{opacity:1;transform:translateY(-10px) scale(1.1);}100%{opacity:0;transform:translateY(-70px) scale(1);}}
  .flyer{position:fixed;font-size:48px;opacity:.96;pointer-events:none;z-index:5;transition:transform .72s cubic-bezier(.4,0,.5,1), opacity .72s;will-change:transform;}
  .drag-ghost{position:fixed;font-size:54px;pointer-events:none;z-index:30;transform:translate(-50%,-55%);filter:drop-shadow(0 4px 6px rgba(0,0,0,.3));}
  .heart{position:absolute;pointer-events:none;font-size:26px;opacity:0;z-index:9;}
  .heart.go{animation:floatUp 1.4s ease forwards;}
  @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(.6);}100%{opacity:0;transform:translateY(-150px) scale(1.2) rotate(20deg);}}
  .poop{position:fixed;z-index:7;pointer-events:none;transition:transform .6s cubic-bezier(.45,0,.7,1),opacity .5s;will-change:transform;}
  .pellet{width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#a9744a,#6e4422);box-shadow:0 1px 2px rgba(0,0,0,.3);}
  .nana{font-size:30px;filter:sepia(1) saturate(2.2) hue-rotate(-12deg) brightness(.58);}
  .log{width:36px;height:17px;border-radius:9px;background:linear-gradient(180deg,#a9744a,#6e4422);box-shadow:0 1px 2px rgba(0,0,0,.3);}
  .bigball{width:30px;height:30px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#9c6638,#5a3618);box-shadow:0 2px 3px rgba(0,0,0,.35);}
  .splat{width:32px;height:16px;border-radius:55% 50% 60% 45%/65% 60% 45% 40%;background:radial-gradient(circle at 50% 38%,#ffffff,#e6e6dc);box-shadow:0 1px 2px rgba(0,0,0,.2);border:1px solid #dadaceaa;}
  .puddle{position:fixed;z-index:6;width:80px;height:20px;border-radius:50%;pointer-events:none;
    background:radial-gradient(circle at 50% 40%,#ffe66b,#f4c63a);opacity:.85;transform:scale(0);transition:transform .5s ease,opacity .5s ease;}
  .puddle.grow{transform:scale(1);}
  .fartpuff{position:fixed;z-index:6;font-size:26px;pointer-events:none;opacity:0;}
  .fartpuff.go{animation:fartfly .9s ease forwards;}
  @keyframes fartfly{0%{opacity:0;transform:translate(0,0) scale(.5);}30%{opacity:.9;}100%{opacity:0;transform:translate(20px,-30px) scale(1.6);}}
  .sud{position:fixed;font-size:30px;z-index:6;opacity:0;pointer-events:none;}
  .sud.go{animation:sudrise 1.4s ease forwards;}
  @keyframes sudrise{0%{opacity:0;transform:translateY(0) scale(.4);}30%{opacity:.95;}100%{opacity:0;transform:translateY(-54px) scale(1.3);}}
  .acc{position:absolute;left:50%;transform:translateX(-50%);font-size:min(15vw,72px);z-index:7;pointer-events:none;line-height:1;}
  .faller{position:fixed;font-size:44px;z-index:20;cursor:pointer;will-change:transform;}
  .gamebar{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:25;display:none;align-items:center;gap:12px;
    background:rgba(255,253,247,.95);border-radius:18px;padding:8px 14px;box-shadow:0 3px 8px rgba(0,0,0,.2);}
  .gamebar.on{display:flex;}
  .gamebar .gs{font-size:20px;font-weight:900;color:#3f5a3a;font-variant-numeric:tabular-nums;}
  .gamebar .gx{border:none;background:#ff8a80;color:#fff;font-weight:800;border-radius:12px;padding:8px 12px;cursor:pointer;font-family:inherit;}
  .starbadge{position:fixed;top:8px;left:8px;z-index:26;border:none;cursor:pointer;font-family:inherit;font-weight:900;font-size:16px;
    color:#3f5a3a;background:#fffdf7;border-radius:16px;padding:7px 12px;box-shadow:0 3px 0 rgba(63,90,58,.25);}
  .starbadge:active{transform:translateY(2px);}
  .flysticker{position:fixed;z-index:32;font-size:40px;pointer-events:none;transition:transform .9s cubic-bezier(.4,0,.5,1),opacity .9s;}
  .board{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;}
  .board.on{display:flex;}
  .board-inner{background:#fffdf7;border-radius:24px;padding:20px;width:min(90vw,420px);max-height:80vh;overflow:auto;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.3);}
  .board-inner h3{margin:0 0 12px;color:#3f5a3a;}
  .board-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;min-height:50px;}
  .board-grid span{font-size:34px;}
  .board-x{margin-top:14px;border:none;cursor:pointer;font-family:inherit;font-weight:800;background:#9fd47f;color:#3f5a3a;border-radius:14px;padding:12px 22px;}
  .tissue{position:fixed;font-size:48px;z-index:31;pointer-events:none;transform:translate(-50%,-50%);}
  .tissue.scrub{animation:scrub 1s ease;}
  @keyframes scrub{0%{transform:translate(-50%,-50%) rotate(-15deg);}20%{transform:translate(calc(-50% - 24px),-50%) rotate(12deg);}
    40%{transform:translate(calc(-50% + 24px),-50%) rotate(-12deg);}60%{transform:translate(calc(-50% - 18px),-50%) rotate(9deg);}
    80%{transform:translate(calc(-50% + 18px),-50%) rotate(-9deg);}100%{transform:translate(-50%,-50%) rotate(0);}}

  .colors{display:flex;gap:10px;justify-content:center;padding:2px 16px 0;flex-wrap:wrap;}
  .sw{width:34px;height:34px;border-radius:50%;border:3px solid #fff;cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,.2);}
  .sw[aria-pressed="true"]{outline:3px solid #3f5a3a;outline-offset:2px;}
  .sw:active{transform:scale(.92);}

  .tools{padding:4px 10px calc(10px + env(safe-area-inset-bottom));width:100%;}
  .row{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-top:6px;}
  .ibtn{border:none;cursor:pointer;font-family:inherit;font-weight:800;color:#3f5a3a;background:#fffdf7;border-radius:18px;
    box-shadow:0 4px 0 rgba(63,90,58,.28);display:flex;flex-direction:column;align-items:center;gap:1px;padding:8px 12px;min-width:64px;touch-action:none;}
  .ibtn .em{font-size:30px;line-height:1;pointer-events:none;}
  .ibtn .lb{font-size:12px;pointer-events:none;}
  .ibtn:active{transform:translateY(3px);box-shadow:none;}
  .ibtn.act{background:#ffe9a6;box-shadow:0 4px 0 #d9b94e;}
  .ibtn.big{background:#ffe07a;transform:scale(1.35);animation:btnglow 1s ease-in-out infinite;}
  .ibtn.big .em{font-size:40px;}
  @keyframes btnglow{0%,100%{box-shadow:0 4px 0 #cf9a4e,0 0 0 0 rgba(255,190,60,.0);}50%{box-shadow:0 4px 0 #cf9a4e,0 0 22px 8px rgba(255,190,60,.95);}}

  @media (prefers-reduced-motion:reduce){.creature.breathe{animation:none;}}
</style>

<div id="stage">
  <button class="starbadge" id="starbadge">⭐ <span id="starnum">0</span></button>
  <div class="board" id="board"><div class="board-inner"><h3>⭐ 내 스티커</h3><div class="board-grid" id="boardgrid"></div><button class="board-x" id="boardx">닫기</button></div></div>
  <p class="hint" id="hint">위에서 동물을 골라봐! 👆 먹이는 끌어다 주세요 🍴</p>
  <div class="picker" id="picker"></div>
  <div class="foodtop" id="foodtop">
    <div class="ftnum"><span class="ftwho" id="ftwho">🐰</span><span class="ftn" id="ftn">0</span></div>
    <div class="ftgrid" id="ftgrid"></div>
  </div>
  <div class="scene" id="scene">
    <div class="gamebar" id="gamebar"><span class="gs" id="gscore">🎮 0</span><button class="gx" id="gexit">끝내기</button></div>
    <div class="blanket" id="blanket"></div>
    <div class="zzz" id="zzz">💤</div>
  </div>
  <div class="colors" id="colors"></div>
  <div class="tools"><div class="row" id="foods"></div><div class="row" id="actions"></div></div>
</div>

  const CRYEL={};
  function playCry(key){const src=CRIES[key];if(!src){blip(600,900,.12,"square");return;}
    let el=CRYEL[key];if(!el){el=new Audio();el.src=src;el.preload="auto";CRYEL[key]=el;}
    try{el.pause();el.currentTime=0;const p=el.play();if(p&&p.catch)p.catch(()=>blip(600,900,.12,"square"));}catch(e){blip(600,900,.12,"square");}}
  function blip(f0,f1,dur,type){A();const t=ac.currentTime;const o=ac.createOscillator(),g=ac.createGain();
    o.type=type||"sine";o.frequency.setValueAtTime(f0,t);o.frequency.exponentialRampToValueAtTime(Math.max(1,f1||f0),t+dur);
    o.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.25,t+.02);
    g.gain.exponentialRampToValueAtTime(.0001,t+dur);o.start(t);o.stop(t+dur+.02);}
  function boing(){A();const t=ac.currentTime;const o=ac.createOscillator(),g=ac.createGain();o.type="sine";
    o.frequency.setValueAtTime(180,t);o.frequency.exponentialRampToValueAtTime(700,t+.18);o.frequency.exponentialRampToValueAtTime(260,t+.45);
    o.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.0001,t+.5);o.start(t);o.stop(t+.55);}
  function nom(){[0,.14,.28].forEach((d,i)=>setTimeout(()=>blip(420-i*20,300-i*20,.1,"triangle"),d*1000));}
  function gulp(){[0,.18,.36].forEach((d,i)=>setTimeout(()=>blip(300-i*30,180-i*30,.13,"sine"),d*1000));}
  function giggle(){[0,.12,.24].forEach((d,i)=>setTimeout(()=>blip(700+i*120,900+i*120,.1,"triangle"),d*1000));}
  function toot(){A();const t=ac.currentTime;const o=ac.createOscillator(),g=ac.createGain();o.type="sawtooth";
    o.frequency.setValueAtTime(240,t);o.frequency.exponentialRampToValueAtTime(110,t+.25);o.connect(g);g.connect(ac.destination);
    g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.0001,t+.3);o.start(t);o.stop(t+.32);}
  function swish(){A();const t=ac.currentTime;[0,.15,.3].forEach((d,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type="triangle";
    o.frequency.setValueAtTime(1400-i*100,t+d);o.frequency.exponentialRampToValueAtTime(700,t+d+.1);o.connect(g);g.connect(ac.destination);
    g.gain.setValueAtTime(.16,t+d);g.gain.exponentialRampToValueAtTime(.0001,t+d+.12);o.start(t+d);o.stop(t+d+.14);});}
  let koVoice=null;function pickVoice(){const vs=speechSynthesis.getVoices();koVoice=vs.find(v=>v.lang==="ko-KR")||vs.find(v=>v.lang&&v.lang.startsWith("ko"))||null;}
  if("speechSynthesis" in window){pickVoice();speechSynthesis.onvoiceschanged=pickVoice;}
  function say(t){if(!("speechSynthesis" in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang="ko-KR";if(koVoice)u.voice=koVoice;u.rate=1;u.pitch=1.4;speechSynthesis.speak(u);}

  // ---- visuals ----
  function setHint(t){hint.textContent=t;}
  function bubble(text,x,y){const b=document.createElement("div");b.className="bubble";b.textContent=text;b.style.left=(x-20)+"px";b.style.top=(y-30)+"px";
    stage.appendChild(b);requestAnimationFrame(()=>b.classList.add("go"));setTimeout(()=>b.remove(),1000);}
  function hearts(x,y){for(let i=0;i<5;i++){const h=document.createElement("div");h.className="heart";h.textContent=["💗","💕","⭐","✨","💛"][i%5];
    h.style.left=(x-10+(i-2)*22)+"px";h.style.top=y+"px";stage.appendChild(h);requestAnimationFrame(()=>h.classList.add("go"));setTimeout(()=>h.remove(),1400);}}
  function centerOf(el){const r=el.getBoundingClientRect();return {x:r.left+r.width/2,y:r.top+r.height/2};}
  function mouthOf(svg){const r=svg.getBoundingClientRect();return {x:r.left+r.width*0.5,y:r.top+r.height*0.5};}
  function flyTo(emoji,target,onArrive){const startX=innerWidth/2-26,startY=innerHeight-130;const el=document.createElement("div");el.className="flyer";el.textContent=emoji;
    el.style.left=startX+"px";el.style.top=startY+"px";stage.appendChild(el);
    requestAnimationFrame(()=>{el.style.transform=`translate(${target.x-startX-26}px,${target.y-startY-10}px) scale(1.25) rotate(-20deg)`;});
    setTimeout(()=>el.style.opacity="0",560);setTimeout(()=>{el.remove();onArrive&&onArrive();},720);}
  function renderTop(){const c=lastCreature;const list=c?c.eaten:[];ftwho.textContent=c?c.emoji:"🐰";ftn.textContent=list.length;
    ftgrid.innerHTML="";list.forEach(em=>{const s=document.createElement("span");s.textContent=em;ftgrid.appendChild(s);});}

  // ---- gauge / poop ----
  function addGauge(wrap){const box=document.createElement("div");box.className="gauges";
    box.innerHTML=`<div class="gauge gpoop"><div class="gfill"></div><span class="gtxt">💩 0/10</span></div>`+
      `<div class="gauge gwater"><div class="gfill gwf"></div><span class="gtxt">💧 0/10</span></div>`;
    wrap.appendChild(box);return {poop:box.querySelector(".gpoop"),water:box.querySelector(".gwater")};}
  function updateGauge(c){const n=Math.min(c.feedCount||0,10);c.gauge.querySelector(".gfill").style.width=(n*10)+"%";
    c.gauge.querySelector(".gtxt").textContent=`💩 ${n}/10`;c.gauge.classList.toggle("full",n>=10);}
  function updateWater(c){const n=Math.min(c.water||0,10);const g=c.gauges.water;g.querySelector(".gfill").style.width=(n*10)+"%";
    g.querySelector(".gtxt").textContent=`💧 ${n}/10`;g.classList.toggle("full",n>=10);}
  function dropPoop(c){const r=c.el.getBoundingClientRect();const baseX=r.left+r.width*0.5,topY=r.top+r.height*0.74,groundY=r.bottom-6;toot();
    const T={
      banana:{cls:"nana",txt:"🍌",n:2,sp:16,rot:true,b:"뿌직!",h:"바나나 똥"},
      log:{cls:"log",n:2,sp:0,stack:true,b:"끄응~",h:"굵은 똥"},
      bigball:{cls:"bigball",n:3,sp:22,b:"쿵!",h:"커다란 똥"},
      splat:{cls:"splat",n:2,sp:20,b:"찌익!",h:"하얀 새똥"},
      pellet:{cls:"pellet",n:5,sp:13,b:"뽕!",h:"동글동글 똥"}
    };
    const t=T[c.poop]||T.pellet;
    for(let i=0;i<t.n;i++){const el=document.createElement("div");el.className="poop "+t.cls;
      if(t.txt)el.textContent=t.txt;
      el.style.left=(baseX-10)+"px";el.style.top=topY+"px";stage.appendChild(el);poops.push(el);
      const tx=t.stack?(Math.random()*6-3):((i-(t.n-1)/2)*t.sp+(Math.random()*6-3));
      const dy=groundY-topY-(t.stack?i*12:i*2);const rot=t.rot?` rotate(${20+i*30}deg)`:(t.cls==="log"?" rotate(-6deg)":"");
      setTimeout(()=>{el.style.transform=`translate(${tx}px,${dy}px)${rot}`;},i*100);}
    bubble(t.b,baseX,topY-10);setHint(c.name+"가 "+t.h+"을 쌌어요! 💩 (휴지로 닦아줘)");
    updateUI();

  function fart(c){const r=c.el.getBoundingClientRect();const x=r.left+r.width*0.5,y=r.top+r.height*0.7;

    colorsEl.appendChild(b);});

  // ---- idle ----
  setInterval(()=>{if(sleeping||!selected)return;const r=Math.random();if(r<0.5)selected.api.blink(1);else if(r<0.78)selected.api.sniff();else selected.api.twitchEar();},2900);

  selectCreature(creatures[0]);
  setTimeout(()=>selected.api.blink(2),600);

  // 뒤로가기로 화면 빠져나가지 않게 (홈화면 앱/단독 실행 시 효과적)
  try{history.pushState(null,"",location.href);window.addEventListener("popstate",function(){history.pushState(null,"",location.href);});
    document.addEventListener("pointerdown",function once(){history.pushState(null,"",location.href);document.removeEventListener("pointerdown",once);});}catch(e){}
})();
</script>
